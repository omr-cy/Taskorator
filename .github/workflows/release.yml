name: Release Taskorator Plugin

on:
  push:
    branches:
      - main
      - master
    tags:
      - '*'
  pull_request:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build plugin
        run: npm run build

      - name: Create Package Folder and Zip
        run: |
          mkdir Taskorator
          # Copy artifacts from the build directory (defined in esbuild.config.mjs)
          cp build/main.js Taskorator/main.js
          cp build/manifest.json Taskorator/manifest.json
          cp build/styles.css Taskorator/styles.css
          # Create zip file named after the plugin
          zip -r Taskorator.zip Taskorator/

      - name: Release (Tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifacts: 'build/main.js,build/manifest.json,build/styles.css,Taskorator.zip'
          token: ${{ secrets.GITHUB_TOKEN }}
          name: "Taskorator ${{ github.ref_name }}"
          body: "Release of version ${{ github.ref_name }}"

      - name: Release (Pull Request)
        if: github.event_name == 'pull_request'
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifacts: 'build/main.js,build/manifest.json,build/styles.css,Taskorator.zip'
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: "pr-${{ github.event.number }}"
          name: "Taskorator PR #${{ github.event.number }}"
          body: "Automatic build for Pull Request #${{ github.event.number }}. This is a pre-release artifact."
          prerelease: true
