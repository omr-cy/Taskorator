name: Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - '*'
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Build plugin
        run: npm run build

      - name: Create Release Zip
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          mkdir -p taskorator
          cp build/main.js build/manifest.json build/styles.css taskorator/ 2>/dev/null || :
          zip -r Taskorator.zip taskorator

      - name: Upload Release Assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            build/main.js
            build/manifest.json
            build/styles.css
            Taskorator.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
