name: Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - '*'
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build plugin
        run: npm run build

      - name: Create Release Zip
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          mkdir -p taskorator
          cp main.js manifest.json styles.css taskorator/ 2>/dev/null || :
          # Check if styles.css exists before copying, or just copy what's there
          # manifest.json and main.js are mandatory
          zip -r Taskorator.zip taskorator

      - name: Upload Release Assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            main.js
            manifest.json
            styles.css
            Taskorator.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
